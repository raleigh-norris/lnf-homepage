<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Section — Mockup A: Full-Bleed Cards with Overlay Tags</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&display=swap');

    :root {
      --color-bg: #faf8f2;
      --color-text: #1a1a1a;
      --color-text-secondary: #555;
      --color-text-muted: #777;
      --color-green: #2dd44c;
      --color-border: #e0ddd6;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-md: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .fantasy {
      padding: 96px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .fantasy h2 {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 400;
      letter-spacing: -0.01em;
      text-align: center;
      margin-bottom: 56px;
    }

    .homes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .home-card {
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
    }

    .home-photo {
      aspect-ratio: 3 / 4;
      background: #d8d4cc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a09a8e;
      font-size: 13px;
      position: relative;
    }

    .home-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px 24px 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
    }

    .home-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .home-tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 5px 10px;
      border-radius: 100px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .home-tag.city {
      background: rgba(255,255,255,0.92);
      color: var(--color-text);
    }

    .home-editorial {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      line-height: 1.4;
    }

    @media (max-width: 900px) {
      .fantasy { padding: 64px 24px; }
      .fantasy h2 { font-size: 34px; margin-bottom: 40px; }
      .homes-grid { grid-template-columns: 1fr; gap: 20px; }
      .home-photo { aspect-ratio: 4 / 3; }
    }
  </style>
</head>
<body>
  <section class="fantasy">
    <h2>Turn the fantasy into reality</h2>

    <div class="homes-grid">
      <div class="home-card">
        <div class="home-photo">
          Photo placeholder
          <div class="home-overlay">
            <div class="home-tags">
              <span class="home-tag city">Oakland, CA</span>
              <span class="home-tag">Compound</span>
            </div>
            <p class="home-editorial">Great for multigenerational living</p>
          </div>
        </div>
      </div>

      <div class="home-card">
        <div class="home-photo">
          Photo placeholder
          <div class="home-overlay">
            <div class="home-tags">
              <span class="home-tag city">Austin, TX</span>
              <span class="home-tag">Duplex</span>
            </div>
            <p class="home-editorial">Perfect for two families who want shared outdoor space</p>
          </div>
        </div>
      </div>

      <div class="home-card">
        <div class="home-photo">
          Photo placeholder
          <div class="home-overlay">
            <div class="home-tags">
              <span class="home-tag city">Portland, OR</span>
              <span class="home-tag">Adjacent Lots</span>
            </div>
            <p class="home-editorial">Ideal for friends who want proximity with privacy</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
