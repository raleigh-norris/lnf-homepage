<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Section — Mockup C: Magazine Layout with Featured Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&display=swap');

    :root {
      --color-bg: #faf8f2;
      --color-text: #1a1a1a;
      --color-text-secondary: #555;
      --color-text-muted: #777;
      --color-green: #2dd44c;
      --color-border: #e0ddd6;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-md: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .fantasy {
      padding: 96px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .fantasy h2 {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 400;
      letter-spacing: -0.01em;
      text-align: center;
      margin-bottom: 56px;
    }

    /* Asymmetric grid: one large, two stacked */
    .homes-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 24px;
    }

    .home-card {
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    .home-card.featured {
      grid-row: 1 / 3;
    }

    .home-photo {
      flex: 1;
      min-height: 220px;
      background: #d8d4cc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a09a8e;
      font-size: 13px;
    }
    .home-card.featured .home-photo {
      min-height: 340px;
    }

    .home-info {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .home-card.featured .home-info {
      padding: 24px 28px;
    }

    .home-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .home-city {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
    }

    .home-type {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 5px 12px;
      border-radius: 100px;
      background: var(--color-green);
      color: var(--color-text);
    }

    .home-editorial {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--color-text);
    }
    .home-card.featured .home-editorial {
      font-size: 22px;
    }

    @media (max-width: 900px) {
      .fantasy { padding: 64px 24px; }
      .fantasy h2 { font-size: 34px; margin-bottom: 40px; }
      .homes-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }
      .home-card.featured { grid-row: auto; }
      .home-card.featured .home-photo { min-height: 240px; }
    }
  </style>
</head>
<body>
  <section class="fantasy">
    <h2>Turn the fantasy into reality</h2>

    <div class="homes-grid">
      <div class="home-card featured">
        <div class="home-photo">Photo placeholder</div>
        <div class="home-info">
          <div class="home-top-row">
            <span class="home-city">Oakland, CA</span>
            <span class="home-type">Compound</span>
          </div>
          <p class="home-editorial">Great for multigenerational living</p>
        </div>
      </div>

      <div class="home-card">
        <div class="home-photo">Photo placeholder</div>
        <div class="home-info">
          <div class="home-top-row">
            <span class="home-city">Austin, TX</span>
            <span class="home-type">Duplex</span>
          </div>
          <p class="home-editorial">Perfect for two families who want shared outdoor space</p>
        </div>
      </div>

      <div class="home-card">
        <div class="home-photo">Photo placeholder</div>
        <div class="home-info">
          <div class="home-top-row">
            <span class="home-city">Portland, OR</span>
            <span class="home-type">Adjacent Lots</span>
          </div>
          <p class="home-editorial">Ideal for friends who want proximity with privacy</p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
